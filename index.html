<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#011e39" />
    <title>Výškový profil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="screen">
      <div class="map-area" aria-hidden="true">
        <div class="scale-bar">
          <span>0</span>
          <div class="scale-bar__line"></div>
          <span>50 km</span>
        </div>

        <div class="map-route"></div>

        <div class="map-controls">
          <button type="button" class="map-btn" aria-label="Vrstvy mapy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 3L3 8l9 5 9-5-9-5z" />
              <path d="M3 12l9 5 9-5" />
              <path d="M3 16l9 5 9-5" />
            </svg>
          </button>
          <button type="button" class="map-btn" aria-label="Kompas a poloha">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="9" />
              <polygon points="12,6 14,14 12,12 10,14" fill="currentColor" stroke="none" />
            </svg>
          </button>
        </div>

        <div class="user-dot" aria-hidden="true">
          <svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
            <circle cx="13" cy="13" r="8" fill="#1a6cff" stroke="#fff" stroke-width="3" />
          </svg>
        </div>
      </div>

      <section class="bottom-sheet" aria-label="Statistiky trasy">
        <div class="sheet-actions">
          <button type="button" class="sheet-icon-btn" aria-label="Rozšířit">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path
                fill="currentColor"
                fill-opacity="0.6"
                d="M12 22L6 16L7.425 14.575L12 19.15L16.575 14.575L18 16L12 22ZM7.45 9.4L6 8L12 2L18 8L16.55 9.4L12 4.85L7.45 9.4Z"
              />
            </svg>
          </button>
          <button type="button" class="sheet-icon-btn" aria-label="Zavřít">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" />
            </svg>
          </button>
        </div>

        <div class="sheet-header">
          <h1 class="sheet-title">150 km</h1>
          <p class="sheet-sub">12:45 h</p>
        </div>

        <div class="info-grid">
          <div class="info-grid-default">
            <div class="info-item">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M7 14l5-5 5 5H7z" />
              </svg>
              <span>1600 m n.m.</span>
            </div>
            <div class="info-item">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M7 10l5 5 5-5H7z" />
              </svg>
              <span>100 m n.m.</span>
            </div>
            <div class="info-item">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z" />
              </svg>
              <span>5000 m</span>
            </div>
            <div class="info-item">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M16 18l2.29-2.29-4.88-4.88-4 4L2 7.41 3.41 6l6 6 4-4 6.3 6.29L22 12v6z" />
              </svg>
              <span>3600 m</span>
            </div>
          </div>
          <div class="info-grid-scrub" aria-hidden="true">
            <div class="info-scrub-row info-scrub-row--line1" role="group">
              <span class="info-scrub-time"></span>
              <span class="info-scrub-sep" aria-hidden="true">•</span>
              <span class="info-scrub-dist"></span>
              <span class="info-scrub-sep" aria-hidden="true">•</span>
              <span class="info-scrub-elev"></span>
              <span class="info-scrub-sep" aria-hidden="true">•</span>
              <span class="info-scrub-grade-wrap">
                <svg class="info-scrub-grade-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path
                    d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"
                  />
                </svg>
                <span class="info-scrub-grade"></span>
              </span>
            </div>
            <p class="info-scrub-row info-scrub-row--surface">
              <span class="info-scrub-surface-icon info-scrub-surface-icon--unpaved" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="8" viewBox="0 0 16 8" fill="none">
                  <path d="M0 4H16" stroke="#99ADFF" stroke-width="8" stroke-linejoin="bevel" />
                  <path
                    d="M0 4H16"
                    stroke="#0033FF"
                    stroke-width="4"
                    stroke-linejoin="bevel"
                    stroke-dasharray="6 4"
                  />
                </svg>
              </span>
              <span class="info-scrub-surface-icon info-scrub-surface-icon--paved" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="8" viewBox="0 0 16 8" fill="none">
                  <path d="M0 4H16" stroke="#0033FF" stroke-width="8" stroke-linejoin="bevel" />
                  <path
                    d="M0 4H16"
                    stroke="#99ADFF"
                    stroke-width="4"
                    stroke-linejoin="bevel"
                    stroke-dasharray="6 4"
                  />
                </svg>
              </span>
              <span class="info-scrub-surface-text"></span>
            </p>
            <p class="info-scrub-row info-scrub-row--way">
              <span class="info-scrub-way-icon info-scrub-way-icon--pesina" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="8" viewBox="0 0 16 8" fill="none">
                  <path d="M0 4H16" stroke="#EBE5D5" stroke-width="8" stroke-linejoin="bevel" />
                  <path
                    d="M0 4H16"
                    stroke="#837B62"
                    stroke-width="4"
                    stroke-linejoin="bevel"
                    stroke-dasharray="2 2"
                  />
                </svg>
              </span>
              <span class="info-scrub-way-icon info-scrub-way-icon--chodnik" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="8" viewBox="0 0 16 8" fill="none">
                  <path d="M0 4H16" stroke="#ECECF1" stroke-width="8" stroke-linejoin="bevel" />
                  <path d="M0 4H16" stroke="#BEBCBA" stroke-width="4" stroke-linejoin="bevel" />
                </svg>
              </span>
              <span class="info-scrub-way-text"></span>
            </p>
          </div>
        </div>

        <div class="profile-wrap">
          <div
            class="profile-chart"
            role="img"
            aria-label="Výškový profil trasy, přibližení a posun dvěma prsty, výběr bodu jedním prstem"
            title="Jeden prst: bod na profilu; dva prsty: zoom a posun. Myš: posun při držení Shift."
          ></div>
          <div class="profile-y-labels">
            <span>1600 m</span>
            <span>850 m</span>
            <span>100 m</span>
          </div>
          <div class="profile-x-labels">
            <span>50 km</span>
            <span>100 km</span>
            <span>150 km</span>
          </div>
        </div>

        <div class="home-indicator" aria-hidden="true"></div>
      </section>
    </div>
    <script src="route-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
